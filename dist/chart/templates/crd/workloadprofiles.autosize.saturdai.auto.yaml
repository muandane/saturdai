{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: workloadprofiles.autosize.saturdai.auto
spec:
  group: autosize.saturdai.auto
  names:
    kind: WorkloadProfile
    listKind: WorkloadProfileList
    plural: workloadprofiles
    shortNames:
    - wp
    singular: workloadprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.downsizePauseCyclesRemaining
      name: Pause
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: WorkloadProfile is the Schema for the workloadprofiles API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkloadProfileSpec defines the desired state of WorkloadProfile.
            properties:
              collectionIntervalSeconds:
                default: 30
                description: CollectionIntervalSeconds is how often metrics are collected.
                  Default 30. Range 10–300.
                format: int32
                maximum: 300
                minimum: 10
                type: integer
              containers:
                description: Containers sets optional per-container min/max resource
                  bounds.
                items:
                  description: ContainerOverride sets optional min/max resource bounds
                    for a container name from the pod template.
                  properties:
                    maxCPU:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    maxMemory:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    minCPU:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    minMemory:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    name:
                      description: Name matches a container name in the workload pod
                        template.
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 20
                type: array
              cooldownMinutes:
                default: 15
                description: CooldownMinutes is the minimum interval between actuation
                  patches. Default 15.
                format: int32
                minimum: 0
                type: integer
              mode:
                default: balanced
                description: 'Mode selects recommendation strategy: cost, balanced,
                  resilience, or burst.'
                enum:
                - cost
                - balanced
                - resilience
                - burst
                type: string
              targetRef:
                description: TargetRef selects the Deployment or StatefulSet to manage.
                properties:
                  kind:
                    description: Kind is the workload type to resize.
                    enum:
                    - Deployment
                    - StatefulSet
                    type: string
                  name:
                    description: Name is the metadata.name of the target workload.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - targetRef
            type: object
          status:
            description: WorkloadProfileStatus defines the observed state of WorkloadProfile.
            properties:
              conditions:
                description: conditions represent the current state of the WorkloadProfile
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              containers:
                description: Containers holds per-container aggregates and signals.
                  Bounded for etcd size (max 20).
                items:
                  description: ProfileContainerStatus binds a container name to its
                    stats in status.
                  properties:
                    name:
                      type: string
                    stats:
                      description: ContainerResourceStats is observed stats for one
                        logical container (pod template name).
                      properties:
                        cpu:
                          description: CPUStats holds aggregate CPU metrics for status.
                          properties:
                            emaLong:
                              type: number
                            emaShort:
                              type: number
                            lastUpdated:
                              format: date-time
                              type: string
                            quadrantSketches:
                              description: QuadrantSketches holds base64 DDSketches
                                for UTC 6h buckets (index 0=00–06, 1=06–12, 2=12–18,
                                3=18–24).
                              items:
                                type: string
                              maxItems: 4
                              type: array
                            sketch:
                              description: Sketch is a base64-encoded DDSketch protobuf.
                              type: string
                          required:
                          - emaLong
                          - emaShort
                          - sketch
                          type: object
                        lastOOMKill:
                          format: date-time
                          type: string
                        memory:
                          description: MemoryStats holds aggregate memory metrics
                            for status.
                          properties:
                            emaLong:
                              type: number
                            emaShort:
                              type: number
                            lastUpdated:
                              format: date-time
                              type: string
                            quadrantSketches:
                              description: QuadrantSketches holds base64 DDSketches
                                for UTC 6h buckets.
                              items:
                                type: string
                              maxItems: 4
                              type: array
                            sketch:
                              type: string
                            slopePositive:
                              description: SlopePositive is true when SlopeStreak
                                >= the controller threshold (default 5 cycles); blocks
                                memory downsize (070).
                              type: boolean
                            slopeStreak:
                              description: |-
                                SlopeStreak counts consecutive reconciles where memory EMAShort strictly increased vs the prior
                                persisted reconcile (spec §6). Persisted for controller restart safety. Resets when not increasing.
                              format: int32
                              type: integer
                          required:
                          - emaLong
                          - emaShort
                          - sketch
                          - slopePositive
                          type: object
                        restartCount:
                          format: int32
                          type: integer
                      required:
                      - cpu
                      - memory
                      - restartCount
                      type: object
                  required:
                  - name
                  - stats
                  type: object
                maxItems: 20
                type: array
              downsizePauseCyclesRemaining:
                description: DownsizePauseCyclesRemaining counts reconcile cycles
                  where downsizing is blocked after a restart spike (delta > 3).
                format: int32
                type: integer
              lastApplied:
                format: date-time
                type: string
              lastEvaluated:
                format: date-time
                type: string
              metricsRecommendations:
                description: |-
                  MetricsRecommendations are requests/limits from the recommendation engine before safety.Apply
                  (cooldown, OOM/throttle overrides, 70% decrease floor, trend guard). Omitted when empty.
                items:
                  description: Recommendation is a deterministic suggested patch for
                    one container.
                  properties:
                    containerName:
                      type: string
                    cpuLimit:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    cpuRequest:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    memoryLimit:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    memoryRequest:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    rationale:
                      type: string
                  required:
                  - containerName
                  - cpuLimit
                  - cpuRequest
                  - memoryLimit
                  - memoryRequest
                  - rationale
                  type: object
                maxItems: 20
                type: array
              recommendations:
                description: |-
                  Recommendations are effective requests/limits after safety.Apply, with human-readable rationale.
                  These match what actuation and the pod webhook apply when enabled.
                items:
                  description: Recommendation is a deterministic suggested patch for
                    one container.
                  properties:
                    containerName:
                      type: string
                    cpuLimit:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    cpuRequest:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    memoryLimit:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    memoryRequest:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    rationale:
                      type: string
                  required:
                  - containerName
                  - cpuLimit
                  - cpuRequest
                  - memoryLimit
                  - memoryRequest
                  - rationale
                  type: object
                maxItems: 20
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
