{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterprofiles.autosize.saturdai.auto
spec:
  group: autosize.saturdai.auto
  names:
    kind: ClusterProfile
    listKind: ClusterProfileList
    plural: clusterprofiles
    shortNames:
    - csp
    singular: clusterprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.policy.mode
      name: Mode
      type: string
    - jsonPath: .status.matchedNamespaces
      name: Namespaces
      type: integer
    - jsonPath: .status.resolvedCount
      name: Resolved
      type: integer
    - jsonPath: .status.activeChildren
      name: Active
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: ClusterProfile selects workloads across namespaces and fans out
          child WorkloadProfiles.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClusterProfileSpec defines the desired state of ClusterProfile.
            properties:
              maxTargets:
                description: MaxTargets caps the total number of child WorkloadProfiles
                  created. 0 means default (200).
                format: int32
                maximum: 1000
                minimum: 0
                type: integer
              namespaceSelector:
                description: |-
                  NamespaceSelector filters namespaces where workloads are selected.
                  Nil means all namespaces.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              policy:
                description: Policy holds the autosizing configuration applied to
                  all matched workloads.
                properties:
                  collectionIntervalSeconds:
                    default: 30
                    description: CollectionIntervalSeconds is how often metrics are
                      collected. Default 30. Range 10–300.
                    format: int32
                    maximum: 300
                    minimum: 10
                    type: integer
                  containers:
                    description: Containers sets optional per-container min/max resource
                      bounds.
                    items:
                      description: ContainerOverride sets optional min/max resource
                        bounds for a container name from the pod template.
                      properties:
                        maxCPU:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        maxMemory:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        minCPU:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        minMemory:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        name:
                          description: Name matches a container name in the workload
                            pod template.
                          minLength: 1
                          type: string
                      required:
                      - name
                      type: object
                    maxItems: 20
                    type: array
                  cooldownMinutes:
                    default: 15
                    description: CooldownMinutes is the minimum interval between actuation
                      patches. Default 15.
                    format: int32
                    minimum: 0
                    type: integer
                  mode:
                    default: balanced
                    description: 'Mode selects recommendation strategy: cost, balanced,
                      resilience, or burst.'
                    enum:
                    - cost
                    - balanced
                    - resilience
                    - burst
                    type: string
                type: object
              workloadSelector:
                description: WorkloadSelector selects Deployments/StatefulSets within
                  matched namespaces.
                properties:
                  kinds:
                    description: Kinds restricts which workload types are selected.
                      Both default to true when omitted.
                    properties:
                      deployment:
                        default: true
                        description: Deployment enables selection of Deployments.
                        type: boolean
                      statefulSet:
                        default: true
                        description: StatefulSet enables selection of StatefulSets.
                        type: boolean
                    type: object
                  labelSelector:
                    description: LabelSelector filters workloads by labels. Nil means
                      no label filter (must set SelectAll).
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  selectAll:
                    default: false
                    description: |-
                      SelectAll opts in to selecting every Deployment and StatefulSet in the namespace.
                      Requires explicit opt-in because of the high blast radius.
                    type: boolean
                type: object
                x-kubernetes-validations:
                - message: kinds must not disable both deployment and statefulSet
                  rule: '!has(self.kinds) || ((!has(self.kinds.deployment) || self.kinds.deployment)
                    || (!has(self.kinds.statefulSet) || self.kinds.statefulSet))'
            required:
            - policy
            - workloadSelector
            type: object
            x-kubernetes-validations:
            - message: workloadSelector must specify labelSelector or set selectAll
                to true
              rule: has(self.workloadSelector.labelSelector) || self.workloadSelector.selectAll
          status:
            description: ClusterProfileStatus defines the observed state of ClusterProfile.
            properties:
              activeChildren:
                description: ActiveChildren is the number of child WorkloadProfiles
                  currently managed.
                format: int32
                type: integer
              children:
                description: Children lists child WorkloadProfile references (bounded
                  by MaxTargets).
                items:
                  description: ClusterChildReference identifies a child WorkloadProfile
                    managed by this cluster profile.
                  properties:
                    name:
                      description: Name of the child WorkloadProfile.
                      type: string
                    namespace:
                      description: Namespace of the child WorkloadProfile.
                      type: string
                    targetKind:
                      description: TargetKind is the workload kind (Deployment or
                        StatefulSet).
                      type: string
                    targetName:
                      description: TargetName is the workload name.
                      type: string
                  required:
                  - name
                  - namespace
                  - targetKind
                  - targetName
                  type: object
                maxItems: 1000
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              matchedNamespaces:
                description: MatchedNamespaces is the number of namespaces matched
                  by namespaceSelector.
                format: int32
                type: integer
              resolvedCount:
                description: ResolvedCount is the total number of workloads matched
                  across all namespaces.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
