{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "saturdai.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "saturdai.resourceName" (dict "suffix" "workloadprofile-viewer-role" "context" $) }}
rules:
- apiGroups:
  - autosize.saturdai.auto
  resources:
  - workloadprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autosize.saturdai.auto
  resources:
  - workloadprofiles/status
  verbs:
  - get
{{- end }}
