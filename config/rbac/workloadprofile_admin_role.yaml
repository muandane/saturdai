# This rule is not used by the project saturdai itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over autosize.saturdai.auto.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: saturdai
    app.kubernetes.io/managed-by: kustomize
  name: workloadprofile-admin-role
rules:
- apiGroups:
  - autosize.saturdai.auto
  resources:
  - workloadprofiles
  verbs:
  - '*'
- apiGroups:
  - autosize.saturdai.auto
  resources:
  - workloadprofiles/status
  verbs:
  - get
